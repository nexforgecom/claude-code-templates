name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard
        run: |
          npm --version
          node --version
          if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
          npm ci --legacy-peer-deps --force --verbose || npm install --legacy-peer-deps --force --verbose
          npm ls

      - name: Astro check
        working-directory: ./dashboard
        run: npx astro check || true

      - name: Build Astro
        working-directory: ./dashboard
        run: npm run build -- --verbose
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          DEBUG: astro*,vite*

      - name: Debug after build
        if: always()
        working-directory: ./dashboard
        run: |
          ls -la dist || echo "No dist"
          if [ -f dist/index.html ]; then head -n 20 dist/index.html; else echo "No index.html"; fi
          cat package.json | head -n 20 || echo "No package.json"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
